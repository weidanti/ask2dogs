<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>二狗军师</title>
    <style>
        :root { --bg: #f4efe8; --steel: #d2d2d7; --accent: #1d1d1f; --glass: rgba(255,255,255,0.7); --red: #8b0000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "PingFang SC","Helvetica Neue","Noto Sans SC",sans-serif; background: var(--bg); color: var(--accent); padding: 20px; line-height: 1.6; -webkit-font-smoothing: antialiased; max-width: 520px; margin: 0 auto; min-height: 100vh; }
        header { text-align: center; margin-bottom: 30px; padding-top: 10px; }
        header h1 { font-size: 36px; letter-spacing: 4px; font-weight: 300; }
        header p { font-size: 14px; color: #888; margin-top: 8px; letter-spacing: 2px; }
        .card { background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--steel); padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        label.lbl { display: block; font-size: 11px; margin-bottom: 8px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        input, select { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--steel); padding: 12px 0; margin-bottom: 24px; font-size: 16px; outline: none; color: var(--accent); border-radius: 0; -webkit-appearance: none; }
        .loc { display: flex; gap: 15px; margin-bottom: 24px; }
        .loc select { width: 50%; margin-bottom: 0; }
        textarea { width: 100%; height: 120px; resize: none; font-size: 18px; border: 1px solid var(--steel); padding: 10px; background: #fff; box-sizing: border-box; outline: none; color: var(--accent); font-family: inherit; line-height: 1.6; border-radius: 0; }
        textarea::placeholder { color: #bbb; }
        .btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 18px; font-size: 14px; letter-spacing: 2px; cursor: pointer; transition: all .3s; }
        .btn:active { opacity: 0.8; transform: scale(0.98); }
        .btn-retry { background: transparent; border: 1px solid var(--steel); color: #888; padding: 10px; font-size: 12px; letter-spacing: 1px; cursor: pointer; margin-top: 8px; width: 100%; }
        .btn-retry:active { opacity: 0.7; }
        .response { background: #fff; padding: 35px 25px; border-top: 4px solid var(--accent); margin-top: 20px; }
        .greeting { font-weight: bold; font-size: 16px; margin-bottom: 20px; color: var(--red); letter-spacing: 1px; }
        .answer { font-size: 15px; line-height: 2; color: #333; white-space: pre-wrap; text-align: justify; }
        .referral { margin-top: 40px; padding: 30px 20px; border: 1px dashed var(--steel); background: #fafafa; text-align: center; }
        .wx-box { display: inline-flex; align-items: center; gap: 10px; background: #fff; padding: 10px 20px; border: 1px solid #eee; cursor: pointer; margin-top: 10px; }
        .copy-btn { font-size: 11px; background: var(--accent); color: #fff; padding: 4px 8px; border-radius: 2px; border: none; cursor: pointer; }
        .loading { font-size: 13px; color: #999; text-align: center; padding: 60px 20px; }
        .back { text-align: center; margin-top: 16px; padding-bottom: 10px; }
        .back span { font-size: 12px; color: #999; cursor: pointer; letter-spacing: 1px; }
        .back span:hover { color: #666; }
        .sop { font-size: 14px; color: #444; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px; line-height: 1.8; }
        .hidden { display: none; }
        .status-msg { font-size: 11px; text-align: center; margin-top: 12px; }
        .bottom-links { display: flex; justify-content: center; gap: 24px; margin-top: 20px; padding-bottom: 30px; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100% { opacity: .3; } 50% { opacity: 1; } }
        @keyframes blink { 0%,100% { opacity: .15; } 50% { opacity: .9; } }
        .fade-in { animation: fadeUp .5s ease-out; }
        .pulse { animation: pulse 1.5s ease-in-out infinite; }
        .cursor { animation: blink .8s infinite; color: var(--red); }
    </style>
</head>

/* ═══════════════════════════════════════════
   iztro Multi-CDN Loader (8 sources)
   ═══════════════════════════════════════════ */
var IZTRO_CDNS = [
    // 国内 CDN - 最新版本
    'https://cdn.bootcdn.net/ajax/libs/iztro/2.5.3/iztro.min.js',
    'https://cdn.staticfile.net/iztro/2.5.3/iztro.min.js',
    // 国内 CDN - 你之前用的版本
    'https://cdn.bootcdn.net/ajax/libs/iztro/1.4.1/iztro.min.js',
    'https://cdn.staticfile.net/iztro/1.4.1/iztro.min.js',
    // 国际 CDN（部分地区可访问）
    'https://cdn.jsdelivr.net/npm/iztro@2.5.3/dist/iztro.min.js',
    'https://cdn.jsdelivr.net/npm/iztro@1.4.1/dist/iztro.min.js',
    'https://unpkg.com/iztro@2.5.3/dist/iztro.min.js',
    'https://unpkg.com/iztro@1.4.1/dist/iztro.min.js',
];

var iztroReady = false;
var iztroLoading = false;

function loadIztro() {
    if (iztroReady || iztroLoading) return;
    iztroLoading = true;

    var statusEl = document.getElementById('iztro-status');
    var retryEl = document.getElementById('retry-btn');
    statusEl.textContent = '算法引擎加载中...';
    statusEl.style.color = '#aaa';
    statusEl.style.display = 'block';
    retryEl.classList.add('hidden');

    var idx = 0;
    var tried = [];

    function tryNext() {
        if (idx >= IZTRO_CDNS.length) {
            iztroLoading = false;
            statusEl.textContent = '算法引擎加载失败（已尝试' + tried.length + '个源）';
            statusEl.style.color = '#c00';
            retryEl.classList.remove('hidden');
            console.error('iztro load failed. Tried:', tried);
            return;
        }
        var url = IZTRO_CDNS[idx];
        tried.push(url);
        idx++;

        statusEl.textContent = '正在尝试第' + idx + '个源加载...';

        // 清理之前可能失败的 script 标签
        var s = document.createElement('script');
        s.src = url;
        s.timeout = 8000; // 超时标记

        var timer = setTimeout(function() {
            s.onload = s.onerror = null;
            console.warn('Timeout: ' + url);
            tryNext();
        }, 8000);

        s.onload = function() {
            clearTimeout(timer);
            if (window.iztro && (window.iztro.astro || (window.iztro.default && window.iztro.default.astro))) {
                iztroReady = true;
                iztroLoading = false;
                statusEl.style.display = 'none';
                retryEl.classList.add('hidden');
                console.log('iztro loaded from: ' + url);
            } else {
                console.warn('iztro object not found after loading: ' + url);
                tryNext();
            }
        };
        s.onerror = function() {
            clearTimeout(timer);
            console.warn('Failed: ' + url);
            tryNext();
        };
        document.head.appendChild(s);
    }

    tryNext();
}

function retryLoadIztro() {
    iztroLoading = false;
    iztroReady = false;
    loadIztro();
}

// 开始加载
loadIztro();

var ANALYSIS_PROMPT = '你现在是"二狗军师"，一位顶级紫微斗数战略顾问。你必须严格遵守以下心法和作业程序进行分析。\n\n═══ 第一部分：核心底层判定心法 ═══\n\n1. 物理环境论：宫位不是宿命，而是"物理背景"。地支定义能量的浓淡与方向（如子为隐溺、午为发散），主星是该背景下的具体物象。\n2. 细化太极原则：拒绝大而化之的吉凶。必须将问题拆解到最小颗粒度。问财看现金流（财帛）与库位（田宅）；问事看执行力（官禄）与外部阻力（迁移）。\n3. 化忌本质论：化忌不是"凶"，而是"能量的黑洞、执念与必须支付的对价"。忌所在之处是物理上的"不平衡点"，也是翻盘的爆破点。\n4. 星曜互涉效应：没有孤立的星曜。双星同宫、对宫冲照、三方四正构成的"物理闭环"才是定性的依据。\n\n═══ 第二部分：解盘标准作业程序 ═══\n\n第一阶段：定盘与底层架构扫描\n1. 扫描来因宫：确定此生能量的发端（如来因在福德则一生受精神驱动；在兄弟则受现金流和同辈影响）。\n2. 定性命身宫：命宫为先天性格（物理初速），身宫为后天修正（物理轨道）。若命空身实则前半生漂浮后半生落地。\n3. 生年四化落位：这是盘面的"气候背景"。禄是资源，权是掌控，科是名声，忌是欠债。\n\n第二阶段：事业与财帛专项断事\n1. 事业（官禄宫）判定依据：\n   - 物理属性匹配：天机/太阴/空劫适配虚拟、创意、轻资产、互联网。武曲/七杀/擎羊适配实业、技术、金融。天梁/紫微/廉贞适配咨询、管理、法律、体制内。\n   - 变动预判：官禄宫见马或冲代表职场物理位置频繁移动。\n2. 财帛与田宅（财富流向）判定依据：\n   - 现金流（财帛宫）：天同主慢水长流，武曲主金属入账。财帛宫坐忌代表求财有物理阻力，适合"技术换钱"。\n   - 库位（田宅宫）：田宅若破（见破军、空劫），进水再多无法沉淀。财富爆发点通常出现在流年禄/大限禄打入田宅宫的时刻。\n\n第三阶段：动态时空转换（大限与流年）\n1. 大限移位：每十年更换物理背景。重点看大限干引发的四化如何冲动原局痛点。\n2. 流年爆破：流年四化与生年四化重叠的宫位即为该年的"物理事件发生点"。"禄逢冲破"为大凶，"忌转禄"为大吉。\n\n═══ 第三部分：吉凶星与四化认知心法 ═══\n\n化忌深度应用：忌入父母/疾厄主文书纠纷或身体过载。忌入夫妻/交友代表能量被他人抽干。忌在对宫冲则为物理排斥力，冲哪哪里就是禁区。\n\n煞星工具化思维：擎羊为手术刀或切口。火星/铃星为突发爆破力，火贪格主横发但物理背景须在墓库位才能守住。地空/地劫为"反物质"，适合非物质文明。\n\n═══ 输出要求 ═══\n\n按以下五个模块输出，每个模块标题用【】包裹：\n\n【命局】命局底层逻辑，该盘的物理天花板在哪里。\n【自我与关系】自我关系与他人关系分析。\n【事业与财富】事业/财帛分析，适不适合做某事，钱从哪条管道来。\n【运势】大限流年能量波动，什么时候是爆破点，什么时候是清算期。\n【提醒】针对性解决方案，如何利用煞星，如何回避化忌。\n\n风格要求：硬核、确定、专业犀利。像阅历丰富说话直接的老军师。禁止空泛鼓励和情绪价值废话。每一句都要有信息量。总字数控制在1000字内。';

        body: JSON.stringify({
            model: "deepseek-chat",
            messages: [
                { role: "system", content: systemPrompt },
                { role: "user", content: userContent }
            ]
        })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
        if (data.choices && data.choices[0] && data.choices[0].message) {
            return data.choices[0].message.content;
        }
        if (data.error) {
            throw new Error(data.error.message || 'API返回错误');
        }
        return '军师暂时语塞，请稍后再试。';
    });
}

/* ═══════════════════════════════════════════
   Typewriter
   ═══════════════════════════════════════════ */
function typeWriter(text, el, callback) {
    el.innerHTML = '';
    var i = 0;
    function tick() {
        if (i < text.length) {
            el.innerHTML = text.slice(0, i + 1) + '<span class="cursor">▌</span>';
            i++;
            setTimeout(tick, 20);
        } else {
            el.innerHTML = text;
            if (callback) callback();
        }
    }
    tick();
}

/* ═══════════════════════════════════════════
   Page Navigation
   ═══════════════════════════════════════════ */
function showPage(name) {
    document.getElementById('page-input').classList.add('hidden');
    document.getElementById('page-analysis').classList.add('hidden');
    document.getElementById('page-answer').classList.add('hidden');
    document.getElementById('page-' + name).classList.remove('hidden');
    window.scrollTo(0, 0);
}

var globalChartData = '';

/* ═══════════════════════════════════════════
   Step 1 → Analysis
   ═══════════════════════════════════════════ */
function handleStep1() {
    var engine = getAstroEngine();
    if (!iztroReady || !engine) {
        alert("算法库尚未加载成功。\n\n请尝试：\n1. 点击「重新加载算法引擎」按钮\n2. 切换到WiFi网络\n3. 关闭VPN/代理后刷新页面");
        return;
    }
    var dt = document.getElementById('datetime').value;
    var prov = document.getElementById('province').value;
    var ct = document.getElementById('city').value;
    if (!dt || !prov || !ct) { alert("请完整选择时间与地点"); return; }

    try {
        var parts = dt.split('T');
        var datePart = parts[0];
        var timePart = parts[1];
        var hour = parseInt(timePart.split(':')[0], 10);
        var idx = Math.floor(((hour + 1) % 24) / 2);
        var gender = document.getElementById('gender').value;
        var astro = engine.bySolar(datePart, idx, gender, true, 'zh-CN');

        // Build chart data
        var laiin = '命宫';
        for (var i = 0; i < astro.palaces.length; i++) {
            if (astro.palaces[i].isComingPalace) { laiin = astro.palaces[i].name; break; }
        }
        var cd = '性别：' + astro.gender + '，来因宫：' + laiin + '\n\n';
        astro.palaces.forEach(function(p) {
            var ms = p.majorStars.map(function(s) { return s.name + (s.mutagen ? '[生年' + s.mutagen + ']' : ''); }).join('、');
            var ns = p.minorStars.map(function(s) { return s.name; }).join('、');
            cd += p.name + '(' + (p.heavenlyStem||'') + p.earthlyBranch + ')：主星[' + (ms||'空') + ']，辅星[' + (ns||'无') + ']，大限[' + p.decadal.range[0] + '-' + p.decadal.range[1] + ']\n';
        });
        globalChartData = cd;

        // Show page 2 with loading
        showPage('analysis');
        document.getElementById('analysis-loading').classList.remove('hidden');
        document.getElementById('analysis-content').classList.add('hidden');

        callDeepSeek(ANALYSIS_PROMPT, '以下是该用户的紫微斗数完整盘面数据，请按照标准作业程序进行全盘分析：\n\n' + cd)
        .then(function(reply) {
            document.getElementById('analysis-loading').classList.add('hidden');
            document.getElementById('analysis-content').classList.remove('hidden');
            typeWriter(reply, document.getElementById('analysis-text'), function() {
                document.getElementById('question-section').classList.remove('hidden');
                document.getElementById('analysis-back').classList.remove('hidden');
            });
        })
        .catch(function(err) {
            document.getElementById('analysis-loading').classList.add('hidden');
            document.getElementById('analysis-content').classList.remove('hidden');
            document.getElementById('analysis-text').textContent = '军师遇到了一点小麻烦：' + err.message + '\n\n请检查网络后重试。';
            document.getElementById('analysis-back').classList.remove('hidden');
        });

    } catch (e) {
        alert("解析失败：" + e.message + "\n\n请确保选择了完整的时间和地点。");
    }
}

/* ═══════════════════════════════════════════
   Step 2 → Answer
   ═══════════════════════════════════════════ */
function handleAsk() {
    var q = document.getElementById('question').value.trim();
    if (!q) { alert("请描述您的问题"); return; }

    showPage('answer');
    document.getElementById('answer-loading').classList.remove('hidden');
    document.getElementById('answer-content').classList.add('hidden');

    callDeepSeek(getQuestionPrompt(), '【用户问题】\n' + q + '\n\n【紫微斗数盘面数据】\n' + globalChartData)
    .then(function(reply) {
        document.getElementById('answer-loading').classList.add('hidden');
        document.getElementById('answer-content').classList.remove('hidden');
        typeWriter(reply, document.getElementById('answer-text'), function() {
            document.getElementById('referral-section').classList.remove('hidden');
            document.getElementById('answer-links').classList.remove('hidden');
        });
    })
    .catch(function(err) {
        document.getElementById('answer-loading').classList.add('hidden');
        document.getElementById('answer-content').classList.remove('hidden');
        document.getElementById('answer-text').textContent = '军师遇到了一点小麻烦：' + err.message;
        document.getElementById('answer-links').classList.remove('hidden');
    });
}

    document.getElementById('answer-text').innerHTML = '';
    document.getElementById('referral-section').classList.add('hidden');
    document.getElementById('answer-links').classList.add('hidden');
}
