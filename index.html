<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>问问二狗</title>
    <script src="https://unpkg.com/iztro/dist/index.min.js"></script>
    <style>
        :root {
            --bg: #f4efe8; 
            --steel: #d2d2d7;
            --accent: #1d1d1f;
            --glass: rgba(255, 255, 255, 0.6);
        }

        body { 
            font-family: "PingFang SC", "Helvetica Neue", sans-serif; 
            background-color: var(--bg); 
            color: var(--accent);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        header {
            text-align: center; 
            margin-bottom: 30px;
            padding-top: 10px;
        }

        header h1 {
            font-size: 40px; 
            letter-spacing: 2px;
            font-weight: 300;
            margin: 0;
        }

        header p {
            font-size: 14px;
            color: #888;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .input-section {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--steel);
            padding: 24px;
            margin-bottom: 20px;
            box-sizing: border-box;
            animation: fadeIn 0.5s ease; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 8px;
            color: #666;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--steel);
            padding: 10px 0;
            margin-bottom: 24px;
            font-size: 16px;
            border-radius: 0;
            outline: none;
            color: var(--accent);
            text-align: left;
            display: block;
            appearance: none;
            -webkit-appearance: none;
            box-sizing: border-box;
        }

        /* 将省市选择框并排的一行布局 */
        .location-picker {
            display: flex;
            gap: 15px;
            margin-bottom: 24px;
        }

        .location-picker select {
            margin-bottom: 0; /* 抵消默认的下边距 */
            width: 50%;
        }

        input[type="datetime-local"] {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            font-family: inherit;
        }

        textarea {
            height: 100px;
            resize: none;
            font-size: 18px;
        }

        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            font-size: 15px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }

        button:active {
            opacity: 0.7;
        }

        #result-pan {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background-color: var(--steel);
            border: 1px solid var(--steel);
            margin-top: 20px;
            animation: fadeIn 0.6s ease;
        }

        .palace {
            background: rgba(255, 255, 255, 0.9);
            aspect-ratio: 1 / 1.2;
            padding: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .palace-name {
            font-size: 12px;
            font-weight: bold;
            color: #8b0000;
        }

        .stars {
            font-size: 11px;
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
        }

        .center-box {
            grid-column: 2 / 4;
            grid-row: 2 / 4;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .question-display {
            font-style: italic;
            color: #555;
            margin-top: 8px;
            border-top: 1px solid var(--steel);
            padding-top: 8px;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }
    </style>
</head>
<body>

<header>
    <h1>二狗军师</h1>
    <p>不确定就问问二狗</p>
</header>

<div id="step1" class="input-section">
    <label>出生时间</label>
    <input type="datetime-local" id="datetime" value="1995-01-01T12:00">

    <label>出生城市</label>
    <div class="location-picker">
        <select id="province" onchange="initCitySelect()">
            <option value="">省份</option>
        </select>
        <select id="city">
            <option value="">城市</option>
        </select>
    </div>

    <label>性别</label>
    <select id="gender">
        <option value="男">男</option>
        <option value="女">女</option>
    </select>

    <button onclick="goToStep2()">准备开始</button>
</div>

<div id="step2" class="input-section" style="display:none;">
    <label>描述你的问题</label>
    <textarea id="question" placeholder="越详细越好"></textarea>

    <button onclick="renderPan()">请军师指点</button>
</div>

<div id="result-pan" style="display:none;"></div>

    "天津": ["和平区", "河东区", "河西区", "南开区", "河北区", "红桥区", "滨海新区", "东丽区", "西青区", "津南区", "北辰区", "武清区", "宝坻区", "宁河区", "静海区", "蓟州区"],

    "云南": ["昆明", "曲靖", "玉溪", "保山", "昭通", "丽江", "普洱", "临沧", "楚雄", "红河", "文山", "西双版纳", "大理", "德宏", "怒江", "迪庆"],
    "西藏": ["拉萨", "日喀则", "昌都", "林芝", "山南", "那曲", "阿里"],
    "陕西": ["西安", "铜川", "宝鸡", "咸阳", "渭南", "延安", "汉中", "榆林", "安康", "商洛"],
    "甘肃": ["兰州", "嘉峪关", "金昌", "白银", "天水", "武威", "张掖", "平凉", "酒泉", "庆阳", "定西", "陇南", "临夏", "甘南"],
    "青海": ["西宁", "海东", "海北", "黄南", "海南", "果洛", "玉树", "海西"],
    "宁夏": ["银川", "石嘴山", "吴忠", "固原", "中卫"],
    "新疆": ["乌鲁木齐", "克拉玛依", "吐鲁番", "哈密", "昌吉", "博尔塔拉", "巴音郭楞", "阿克苏", "克孜勒苏", "喀什", "和田", "伊犁", "塔城", "阿勒泰"],
    "香港": ["香港"],
    "澳门": ["澳门"],
    "台湾": ["台北", "高雄", "台中", "台南", "板桥", "新竹", "基隆", "嘉义"]

// 初始化省份
const provinceSelect = document.getElementById('province');
for (let p in cityData) {
    let opt = document.createElement('option');
    opt.value = p;
    opt.innerHTML = p;
    provinceSelect.appendChild(opt);
}

// 联动更新城市
function initCitySelect() {
    const province = provinceSelect.value;
    const citySelect = document.getElementById('city');
    citySelect.innerHTML = '<option value="">城市</option>';
    if (province && cityData[province]) {
        cityData[province].forEach(c => {
            let opt = document.createElement('option');
            opt.value = c;
            opt.innerHTML = c;
            citySelect.appendChild(opt);
        });
    }
}

function goToStep2() {
    const datetimeVal = document.getElementById('datetime').value;
    const province = document.getElementById('province').value;
    const city = document.getElementById('city').value;
    if (!datetimeVal || !province || !city) {
        alert("请完整填写出生时间和地点");
        return;
    }
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
}

function renderPan() {
    try {
        const datetimeVal = document.getElementById('datetime').value;
        const province = document.getElementById('province').value;
        const city = document.getElementById('city').value;
        const gender = document.getElementById('gender').value;
        const question = document.getElementById('question').value;

        const parts = datetimeVal.split('T');
        const dateStr = parts[0]; 
        const hour = parseInt(parts[1].split(':')[0], 10); 
        const timeIdx = Math.floor((hour + 1) % 24 / 2);

        const astrolabe = iztro.astro.bySolar(dateStr, timeIdx, gender, true, 'zh-CN');
        
        document.getElementById('step2').style.display = 'none';
        const container = document.getElementById('result-pan');
        container.style.display = 'grid';
        container.innerHTML = ''; 

        astrolabe.palaces.forEach((palace, index) => {
            const div = document.createElement('div');
            div.className = 'palace';
            const majorStars = palace.majorStars.map(s => `<span>${s.name}</span>`).join('');
            div.innerHTML = `
                <div class="palace-name">${palace.name}</div>
                <div class="stars">${majorStars}</div>
                <div style="font-size:9px; color:#999; margin-top: auto;">${palace.decadal.range[0]}-${palace.decadal.range[1]}</div>
            `;
            container.appendChild(div);
            
            if(index === 3) {
                const center = document.createElement('div');
                center.className = 'center-box';
                const timeStr = parts[1]; 
                center.innerHTML = `
                    <div style="font-weight:bold; font-size:14px; margin-bottom: 4px;">${astrolabe.fiveElementsClass}局</div>
                    <div style="font-size:11px; color:#666;">📍 ${province}${city}</div>
                    <div style="font-size:10px; color:#999; margin-bottom: 4px;">生于: ${timeStr}</div>
                    <div class="question-display">问：${question || '未设问'}</div>
                `;
                container.appendChild(center);
            }
        });
    } catch (error) {
        alert("军师技术故障：" + error.message);
    }
}
</script>
</body>
</html>
