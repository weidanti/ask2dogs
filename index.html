<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>问问二狗</title>
    <script src="https://unpkg.zhimg.com/iztro/dist/iztro.min.js"></script>
    <style>
        :root { --bg: #f4efe8; --steel: #d2d2d7; --accent: #1d1d1f; --glass: rgba(255, 255, 255, 0.7); }
        body { font-family: "PingFang SC", "Helvetica Neue", sans-serif; background-color: var(--bg); color: var(--accent); margin: 0; padding: 20px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
        header { text-align: center; margin-bottom: 30px; padding-top: 10px; }
        header h1 { font-size: 36px; letter-spacing: 4px; font-weight: 300; margin: 0; }
        header p { font-size: 14px; color: #888; margin-top: 8px; letter-spacing: 2px; }
        .input-section { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--steel); padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        label { display: block; font-size: 11px; margin-bottom: 8px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--steel); padding: 12px 0; margin-bottom: 24px; font-size: 16px; outline: none; color: var(--accent); border-radius: 0; }
        .location-picker { display: flex; gap: 15px; margin-bottom: 24px; }
        .location-picker select { width: 50%; margin-bottom: 0; }
        textarea { height: 120px; resize: none; font-size: 18px; border: 1px solid var(--steel); padding: 10px; background: #fff; box-sizing: border-box; display: block; }
        button { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; font-size: 14px; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; }
        button:active { opacity: 0.8; transform: scale(0.98); }
        #ai-response-container { display: none; background: #fff; padding: 35px 25px; border-top: 4px solid var(--accent); margin-top: 20px; }
        .greeting { font-weight: bold; font-size: 16px; margin-bottom: 20px; color: #8b0000; letter-spacing: 1px; }
        .answer-content { font-size: 15px; line-height: 2; color: #333; white-space: pre-wrap; text-align: justify; }
        #private-referral { display: none; margin-top: 40px; padding: 30px 20px; border: 1px dashed var(--steel); background: #fafafa; text-align: center; }
        .wechat-box { display: inline-flex; align-items: center; gap: 10px; background: #fff; padding: 10px 20px; border: 1px solid #eee; cursor: pointer; margin-top: 10px; }
        .copy-btn { font-size: 11px; background: var(--accent); color: #fff; padding: 4px 8px; border-radius: 2px; }
        .loading { font-size: 13px; color: #999; text-align: center; padding: 40px; display: none; }
        .sop-report { font-size: 14px; color: #444; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px; line-height: 1.8; }
    </style>
</head>
<body>

<header>
    <h1>二狗军师</h1>
    <p>不确定就问问二狗</p>
</header>

<div id="step1" class="input-section">
    <label>出生时间</label>
    <input type="datetime-local" id="datetime" value="1995-01-01T12:00">
    <label>出生地点</label>
    <div class="location-picker">
        <select id="province" onchange="initCitySelect()"><option value="">省份</option></select>
        <select id="city"><option value="">城市</option></select>
    </div>
    <label>性别</label>
    <select id="gender"><option value="男">男</option><option value="女">女</option></select>
    <button onclick="renderSOPReport()">先简单看看</button>
</div>

<div id="step2" class="input-section" style="display:none;">
    <div id="quick-sop-report" class="sop-report"></div>
    <label>详细描述你的问题</label>
    <textarea id="question" placeholder="建议输入具体事件、时间点或核心困惑..."></textarea>
    <button onclick="startAIEngine()">请军师指点</button>
</div>

<div id="loading-msg" class="loading">正在起卦扫描，调取流年磁场与物理黑洞...</div>

<div id="ai-response-container">
    <div class="greeting">二狗军师曰：</div>
    <div id="answer-content" class="answer-content"></div>
    <div id="private-referral">
        <div style="font-size: 12px; color: #999; margin-bottom: 15px;">进一步全盘物理建模或流月避险</div>
        <p style="font-size: 15px; margin-bottom: 5px; font-weight: bold;">添加二狗军师微信</p>
        <div class="wechat-box" onclick="copyWechat()">
            <span style="font-family: monospace; font-weight: bold; font-size: 18px;" id="wechatId">debut24</span>
            <span class="copy-btn" id="copyText">复制</span>
        </div>
    </div>
</div>

<script>
const cityData = {"北京":["东城区","西城区","朝阳区","海淀区","丰台区","石景山区","通州区","顺义区","昌平区","大兴区"],"上海":["黄浦区","徐汇区","长宁区","静安区","普陀区","虹口区","杨浦区","闵行区","宝山区","嘉定区","浦东新区"],"广东":["广州","深圳","珠海","汕头","佛山","江门","湛江","茂名","肇庆","惠州","梅州","汕尾","河源","阳江","清远","东莞","中山","潮州","揭阳","云浮"],"浙江":["杭州","宁波","温州","嘉兴","湖州","绍兴","金华","衢州","舟山","台州","丽水"],"江苏":["南京","无锡","徐州","常州","苏州","南通","连云港","淮安","盐城","扬州","镇江","泰州","宿迁"],"四川":["成都","自贡","攀枝花","泸州","德阳","绵阳","广元","遂宁","内江","乐山","南充","眉山","宜宾","广安","达州","雅安","巴中","资阳"],"湖北":["武汉","黄石","十堰","宜昌","襄阳","鄂州","荆门","孝感","荆州","黄冈","咸宁","随州","恩施"],"福建":["福州","厦门","莆田","三明","泉州","漳州","南平","龙岩","宁德"],"湖南":["长沙","株洲","湘潭","衡阳","邵阳","岳阳","常德","张家界","益阳","郴州","永州","怀化","娄底"],"山东":["济南","青岛","淄博","枣庄","东营","烟台","潍坊","济宁","泰安","威海","日照","临沂","德州","聊城","滨州","菏泽"],"河南":["郑州","洛阳","开封","平顶山","安阳","鹤壁","新乡","焦作","濮阳","许昌","漯河","三门峡","南阳","商丘","信阳","周口","驻马店"]};

const provinceSelect = document.getElementById('province');
for(let p in cityData){ let opt=document.createElement('option'); opt.value=p; opt.innerHTML=p; provinceSelect.appendChild(opt); }
function initCitySelect(){ const p=provinceSelect.value; const c=document.getElementById('city'); c.innerHTML='<option value="">城市</option>'; if(p && cityData[p]){ cityData[p].forEach(s=>{ let o=document.createElement('option'); o.value=s; o.innerHTML=s; c.appendChild(o); }); } }

function copyWechat() {
    const id = document.getElementById('wechatId').innerText;
    navigator.clipboard.writeText(id).then(() => {
        document.getElementById('copyText').innerText = "已复制";
        setTimeout(() => { document.getElementById('copyText').innerText = "复制"; }, 2000);
    });
}

let globalAstrolabe = null;

function renderSOPReport() {
    // 强制检查 iztro 是否加载
    if (typeof iztro === 'undefined') {
        alert("正在努力连接国内核心算法库，请再等3秒重试...");
        return;
    }
    const datetimeVal = document.getElementById('datetime').value;
    const province = provinceSelect.value;
    const city = document.getElementById('city').value;
    if(!datetimeVal || !province || !city) return alert("请完整选择出生时间、省份和城市");

    try {
        const parts = datetimeVal.split('T');
        const timeIdx = Math.floor((parseInt(parts[1].split(':')[0], 10) + 1) % 24 / 2);
        const gender = document.getElementById('gender').value;
        
        // 核心排盘
        globalAstrolabe = iztro.astro.bySolar(parts[0], timeIdx, gender, true, 'zh-CN');

        const ming = globalAstrolabe.palaces.find(p => p.name === '命宫');
        const laiin = globalAstrolabe.palaces.find(p => p.isComingPalace)?.name;
        const guan = globalAstrolabe.palaces.find(p => p.name === '官禄宫');
        const cai = globalAstrolabe.palaces.find(p => p.name === '财帛宫');

        let reportHtml = `<strong>军师初步扫描：</strong><br><br>`;
        reportHtml += `• 能量发端：来因在【${laiin}】，主导一生核心驱动物理背景。<br>`;
        reportHtml += `• 命局底色：命宫位于【${ming.earthlyBranch}】，主星[${ming.majorStars.map(s=>s.name).join('、')||'空'}]。物理初速已定。<br>`;
        reportHtml += `• 重点领域：官禄位坐[${guan.majorStars.map(s=>s.name).join('、')}]，财帛位坐[${cai.majorStars.map(s=>s.name).join('、')}]。`;

        document.getElementById('quick-sop-report').innerHTML = reportHtml;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        window.scrollTo(0,0);
    } catch (e) {
        alert("解析排盘出错，请刷新页面重试");
        console.error(e);
    }
}

async function startAIEngine() {
    const question = document.getElementById('question').value;
    if(!question) return alert("请描述您的问题");
    document.getElementById('step2').style.display = 'none';
    document.getElementById('loading-msg').style.display = 'block';

    try {
        let chartData = `性别：${globalAstrolabe.gender}，来因：${globalAstrolabe.palaces.find(p=>p.isComingPalace)?.name}\n`;
        globalAstrolabe.palaces.forEach(p => {
            const ms = p.majorStars.map(s => s.name + (s.mutagen ? `[生年${s.mutagen}]` : '')).join('、');
            const ns = p.minorStars.map(s => s.name).join('、');
            chartData += `- ${p.name}(${p.earthlyBranch}): [${ms||'空'}] + [${ns}]，大限[${p.decadal.range[0]}-${p.decadal.range[1]}]\n`;
        });

        const systemPrompt = `你现在是“二狗军师”，顶级战略顾问。严格遵守：物理环境论、化忌本质论、煞星工具化。禁止废话和温情鼓励。输出结构：1.命局底色 2.傲人优势 3.黑洞风险 4.时间窗口 5.破局指令。字数1000字内，书信体，专业犀利。末尾自然提到如需深度建模可私聊。`;
        const API_KEY = "sk-e929f9505b6742afbf1826936dcec69a";

        const response = await fetch("https://api.deepseek.com/chat/completions", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
            body: JSON.stringify({
                model: "deepseek-chat",
                messages: [{role:"system", content:systemPrompt}, {role:"user", content:`问题：${question}\n数据：${chartData}`}]
            })
        });

        const result = await response.json();
        const aiAnswer = result.choices[0].message.content;
        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('ai-response-container').style.display = 'block';
        const content = document.getElementById('answer-content');
        
        let i = 0;
        function typeWriter() {
            if (i < aiAnswer.length) {
                content.innerHTML += aiAnswer.charAt(i); i++; setTimeout(typeWriter, 30);
            } else {
                document.getElementById('private-referral').style.display = 'block';
            }
        }
        typeWriter();
    } catch (error) {
        alert("咨询失败：" + error.message);
        document.getElementById('step2').style.display = 'block';
        document.getElementById('loading-msg').style.display = 'none';
    }
}
</script>
</body>
</html>
