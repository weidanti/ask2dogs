<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>二狗军师 - 紫微斗数</title>
    <script src="https://unpkg.com/iztro/dist/index.min.js"></script>
    <style>
        :root {
            /* 意式极简配色：高级米杏底色，不锈钢边框，深邃黑文字 */
            --bg: #f4efe8; 
            --steel: #d2d2d7;
            --accent: #1d1d1f;
            --glass: rgba(255, 255, 255, 0.6);
        }

        body { 
            font-family: "PingFang SC", "Helvetica Neue", sans-serif; 
            background-color: var(--bg); 
            color: var(--accent);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        /* 顶部品牌区 */
        header {
            text-align: left; /* 强制大标题居左 */
            margin-bottom: 30px;
            padding-top: 10px;
        }

        header h1 {
            font-size: 28px;
            letter-spacing: 2px;
            font-weight: 300;
            margin: 0;
        }

        header p {
            font-size: 12px;
            color: #888;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* 输入卡片 */
        .input-section {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); /* 兼容苹果 */
            border: 1px solid var(--steel);
            padding: 24px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 8px;
            color: #666;
            text-transform: uppercase;
        }

        /* 强制居左并统一表单样式 */
        input, select, textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--steel);
            padding: 10px 0;
            margin-bottom: 24px;
            font-size: 16px;
            border-radius: 0;
            outline: none;
            color: var(--accent);
            text-align: left;
            display: block;
            appearance: none;
            -webkit-appearance: none;
            box-sizing: border-box;
        }

        /* 针对日期输入框的特殊强制居左处理 */
        input[type="date"] {
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        textarea {
            height: 60px;
            resize: none;
        }

        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }

        button:active {
            opacity: 0.7;
        }

        /* 12宫格设计 */
        #result-pan {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background-color: var(--steel);
            border: 1px solid var(--steel);
            margin-top: 30px;
        }

        .palace {
            background: rgba(255, 255, 255, 0.9);
            aspect-ratio: 1 / 1.2;
            padding: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .palace-name {
            font-size: 12px;
            font-weight: bold;
            color: #8b0000; /* 宫位名深红色点缀 */
        }

        .stars {
            font-size: 11px;
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
        }

        .center-box {
            grid-column: 2 / 4;
            grid-row: 2 / 4;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .question-display {
            font-style: italic;
            color: #555;
            margin-top: 8px;
            border-top: 1px solid var(--steel);
            padding-top: 8px;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }
    </style>
</head>
<body>

<header>
    <h1>二狗军师</h1>
    <p>人生推演</p>
</header>

<div class="input-section">
    <label>你的生辰八字</label>
    <input type="date" id="date" value="1995-01-01">
    
    <label>出生时辰</label>
    <select id="time">
        <option value="0">子时 (00:00-01:00)</option>
        <option value="1">丑时 (01:00-03:00)</option>
        <option value="2">寅时 (03:00-05:00)</option>
        <option value="3">卯时 (05:00-07:00)</option>
        <option value="4">辰时 (07:00-09:00)</option>
        <option value="5">巳时 (09:00-11:00)</option>
        <option value="6">午时 (11:00-13:00)</option>
        <option value="7">未时 (13:00-15:00)</option>
        <option value="8">申时 (15:00-17:00)</option>
        <option value="9">酉时 (17:00-19:00)</option>
        <option value="10">戌时 (19:00-21:00)</option>
        <option value="11">亥时 (21:00-23:00)</option>
    </select>

    <label>出生城市</label>
    <input type="text" id="city" placeholder="例如：杭州 或 浙江杭州">

    <label>性别</label>
    <select id="gender">
        <option value="male">乾 (男)</option>
        <option value="female">坤 (女)</option>
    </select>

    <label>你想问军师的问题</label>
    <textarea id="question" placeholder="例如：今年事业运势如何？适合创业吗？"></textarea>

    <button onclick="renderPan()">请军师指点</button>
</div>

<div id="result-pan" style="display:none;">
    </div>

<script>
function renderPan() {
    const dateStr = document.getElementById('date').value;
    const timeIdx = document.getElementById('time').value;
    const city = document.getElementById('city').value;
    const gender = document.getElementById('gender').value;
    const question = document.getElementById('question').value;

    if (!dateStr) {
        alert("请选择生辰八字！");
        return;
    }

    // 1. 调用算法
    const astrolabe = iztro.astro.astrolabeBySolarDate(dateStr, parseInt(timeIdx), gender);
    
    // 2. 显示容器
    const container = document.getElementById('result-pan');
    container.style.display = 'grid';
    container.innerHTML = ''; 

    // 3. 渲染 12 宫
    astrolabe.palaces.forEach((palace, index) => {
        const div = document.createElement('div');
        div.className = 'palace';
        
        // 星曜处理
        const majorStars = palace.majorStars.map(s => `<span>${s.name}</span>`).join('');
        
        div.innerHTML = `
            <div class="palace-name">${palace.name}</div>
            <div class="stars">${majorStars}</div>
            <div style="font-size:9px; color:#999; margin-top: auto;">${palace.decadal.range[0]}-${palace.decadal.range[1]}</div>
        `;
        container.appendChild(div);
        
        // 中间显示区
        if(index === 3) {
            const center = document.createElement('div');
            center.className = 'center-box';
            center.innerHTML = `
                <div style="font-weight:bold; font-size:14px; margin-bottom: 4px;">${astrolabe.fiveElementsClass}局</div>
                <div style="font-size:11px; color:#666;">📍 ${city || '未提供城市'}</div>
                <div class="question-display">问：${question || '未设问'}</div>
            `;
            container.appendChild(center);
        }
    });
    
    // 自动滚动到底部看结果
    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>

</body>
</html>
