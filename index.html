<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的紫微斗数排盘</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { color: #333; font-size: 1.5rem; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #6200ee; color: white; border: none; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #e8eaf6; border-radius: 8px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>紫微斗数排盘</h1>
        <p>输入你的生辰八字：</p>
        <input type="date" id="birthday">
        <select id="gender">
            <option value="male">男</option>
            <option value="female">女</option>
        </select>
        <button onclick="startCalculate()">开始排盘</button>
        
        <div id="result">
            <strong>排盘结果：</strong>
            <p id="output">正在连接算法库...</p>
        </div>
    </div>

    <script>
        function startCalculate() {
            const birth = document.getElementById('birthday').value;
            if(!birth) { alert('请先选择日期'); return; }
            
            document.getElementById('result').style.display = 'block';
            document.getElementById('output').innerHTML = "你选择的生日是：" + birth + "<br>系统正在集成 iztro 算法库中...";
            // 未来这里会接入真正的紫微斗数运算代码
        }
    </script>
</body>
</html>
