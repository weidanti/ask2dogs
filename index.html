<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>问问二狗</title>
    <script src="https://cdn.jsdelivr.net/npm/iztro/dist/iztro.min.js"></script>
    <style>
        :root {
            --bg: #f4efe8; 
            --steel: #d2d2d7;
            --accent: #1d1d1f;
            --glass: rgba(255, 255, 255, 0.6);
        }

        body { 
            font-family: "PingFang SC", "Helvetica Neue", sans-serif; 
            background-color: var(--bg); 
            color: var(--accent);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        header {
            text-align: center; 
            margin-bottom: 30px;
            padding-top: 10px;
        }

        header h1 {
            font-size: 40px; 
            letter-spacing: 2px;
            font-weight: 300;
            margin: 0;
        }

        header p {
            font-size: 14px;
            color: #888;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .input-section {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--steel);
            padding: 24px;
            margin-bottom: 20px;
            box-sizing: border-box;
            animation: fadeIn 0.5s ease; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 8px;
            color: #666;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--steel);
            padding: 10px 0;
            margin-bottom: 24px;
            font-size: 16px;
            border-radius: 0;
            outline: none;
            color: var(--accent);
            text-align: left;
            display: block;
            appearance: none;
            -webkit-appearance: none;
            box-sizing: border-box;
        }

        .location-picker {
            display: flex;
            gap: 15px;
            margin-bottom: 24px;
        }

        .location-picker select {
            margin-bottom: 0; 
            width: 50%;
        }

        input[type="datetime-local"] {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            font-family: inherit;
        }

        textarea {
            height: 100px;
            resize: none;
            font-size: 18px;
        }

        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            font-size: 15px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }

        button:active {
            opacity: 0.7;
        }

        #ai-response-container {
            display: none;
            background: #fff;
            padding: 30px 20px;
            border-top: 3px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            animation: fadeIn 0.8s ease;
            margin-top: 20px;
        }

        .greeting {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
            color: #8b0000;
        }

        .answer-content {
            font-size: 15px;
            line-height: 1.8;
            color: #444;
            white-space: pre-wrap; 
        }

        .loading {
            font-style: italic;
            color: #888;
            text-align: center;
            padding: 20px;
            display: none;
        }
    </style>
</head>
<body>

<header>
    <h1>二狗军师</h1>
    <p>不确定就问问二狗</p>
</header>

<div id="step1" class="input-section">
    <label>出生时间</label>
    <input type="datetime-local" id="datetime" value="1995-01-01T12:00">

    <label>出生地点</label>
    <div class="location-picker">
        <select id="province" onchange="initCitySelect()">
            <option value="">省份</option>
        </select>
        <select id="city">
            <option value="">城市</option>
        </select>
    </div>

    <label>性别</label>
    <select id="gender">
        <option value="男">男</option>
        <option value="女">女</option>
    </select>

    <button onclick="goToStep2()">准备开始</button>
</div>

<div id="step2" class="input-section" style="display:none;">
    <label>描述你的问题</label>
    <textarea id="question" placeholder="越详细越好"></textarea>

    <button onclick="startAIEngine()">请军师指点</button>
</div>

<div id="loading-msg" class="loading">军师正在起卦排盘，提取深度命理数据...</div>

<div id="ai-response-container">
    <div class="greeting">二狗军师曰：</div>
    <div id="answer-content" class="answer-content"></div>
</div>

<script>
// 极简版省市数据（为了不占用太多代码空间）
const cityData = {
    "北京": ["东城区", "西城区", "朝阳区", "海淀区"],
    "上海": ["黄浦区", "徐汇区", "静安区", "浦东新区"],
    "广东": ["广州", "深圳", "珠海", "东莞", "佛山"],
    "浙江": ["杭州", "宁波", "温州", "嘉兴"],
    "江苏": ["南京", "苏州", "无锡", "常州"],
    "四川": ["成都", "绵阳", "乐山"],
    // 之前完整的省市数据被折叠了，你可以直接测试功能
    "其他": ["请选择其他省份城市测试"]
};

const provinceSelect = document.getElementById('province');
for (let p in cityData) {
    let opt = document.createElement('option'); opt.value = p; opt.innerHTML = p; provinceSelect.appendChild(opt);
}
function initCitySelect() {
    const province = provinceSelect.value;
    const citySelect = document.getElementById('city');
    citySelect.innerHTML = '<option value="">城市</option>';
    if (province && cityData[province]) {
        cityData[province].forEach(c => { let opt = document.createElement('option'); opt.value = c; opt.innerHTML = c; citySelect.appendChild(opt); });
    }
}

function goToStep2() {
    const datetimeVal = document.getElementById('datetime').value;
    const province = document.getElementById('province').value;
    const city = document.getElementById('city').value;
    if (!datetimeVal || !province || !city) {
        alert("请完整填写出生时间和地点");
        return;
    }
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
}

function startAIEngine() {
    if (typeof iztro === 'undefined') {
        alert("算法大脑加载失败，请刷新重试！");
        return;
    }

    document.getElementById('step2').style.display = 'none';
    document.getElementById('loading-msg').style.display = 'block';

    try {
        const datetimeVal = document.getElementById('datetime').value;
        const gender = document.getElementById('gender').value;
        const question = document.getElementById('question').value;
        
        const parts = datetimeVal.split('T');
        const hour = parseInt(parts[1].split(':')[0], 10); 
        const timeIdx = Math.floor((hour + 1) % 24 / 2);
        const astrolabe = iztro.astro.bySolar(parts[0], timeIdx, gender, true, 'zh-CN');

        // ==========================================
        // 这里就是刚升级的详尽版数据翻译器
        // ==========================================
        let chartText = `【基本信息】\n命主性别：${gender}\n五行局：${astrolabe.fiveElementsClass}局\n命主：${astrolabe.soul}\n身主：${astrolabe.body}\n命宫：${astrolabe.destinyPalace}\n身宫：${astrolabe.bodyPalace}\n\n【十二宫位详批】\n`;
        
        astrolabe.palaces.forEach(p => {
            const majorStars = p.majorStars.map(s => {
                let name = s.name;
                if(s.mutagen) name += `[生年${s.mutagen}]`; 
                return name;
            }).join('、') || '无主星';
            
            const minorStars = p.minorStars.map(s => s.name).join('、') || '无辅星';
            const miniStars = p.adjectiveStars.map(s => s.name).join('、') || '无';
            const changsheng = p.changsheng12;

            chartText += `--- 【${p.name}】(${p.earthlyBranch}) ---\n`;
            chartText += `大限范围: ${p.decadal.range[0]}-${p.decadal.range[1]}岁\n`;
            chartText += `主星: ${majorStars}\n`;
            chartText += `辅星: ${minorStars}\n`;
            chartText += `杂曜: ${miniStars}\n`;
            chartText += `十二长生: ${changsheng}\n\n`;
        });

        // 最终要发给大模型的完整 Prompt
        const finalPromptForAI = `
你现在是“二狗军师”，一个说话一针见血、幽默接地气、但功底极深的紫微斗数命理师。
这是用户的紫微斗数命盘数据：
${chartText}

用户现在面临的问题是：“${question}”

请结合他的命盘（特别是事业宫、财帛宫或相关宫位），用朋友聊天的口吻给他一个直接、明确的建议。不要罗列术语，直接说人话，控制在300字以内。
        `;
        
        // 开发者检查点：在浏览器控制台打印出来，确认数据提取成功
        console.log("即将发送给大模型的数据：", finalPromptForAI);

        // 模拟 AI 延迟输出（这里目前还是模拟文案，下一步将接入真实的 API）
        setTimeout(() => {
            document.getElementById('loading-msg').style.display = 'none';
            const responseBox = document.getElementById('ai-response-container');
            const answerContent = document.getElementById('answer-content');
            responseBox.style.display = 'block';

            const mockAIResponse = "（这是一条测试回复，证明深度的四化和辅星数据已成功提取并在后台准备就绪。）\n\n等我们接上 DeepSeek 的 API，这里就会显示结合你命盘生年四化和十二长生的真实解盘内容了。准备好 API Key 了吗？";
            
            let i = 0;
            function typeWriter() {
                if (i < mockAIResponse.length) {
                    answerContent.innerHTML += mockAIResponse.charAt(i);
                    i++;
                    setTimeout(typeWriter, 30);
                }
            }
            typeWriter();

        }, 1500);

    } catch (error) {
        alert("军师掐指一算，出了点bug：" + error.message);
    }
}
</script>
</body>
</html>
