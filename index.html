<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>问问二狗。</title>
    <script src="https://unpkg.com/iztro/dist/index.min.js"></script>
    <style>
        :root {
            /* 意式极简配色 */
            --bg: #f4efe8; 
            --steel: #d2d2d7;
            --accent: #1d1d1f;
            --glass: rgba(255, 255, 255, 0.6);
        }

        body { 
            font-family: "PingFang SC", "Helvetica Neue", sans-serif; 
            background-color: var(--bg); 
            color: var(--accent);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        /* 顶部品牌区 */
        header {
            text-align: center; 
            margin-bottom: 30px;
            padding-top: 10px;
        }

        header h1 {
            font-size: 40px; 
            letter-spacing: 2px;
            font-weight: 300;
            margin: 0;
        }

        header p {
            font-size: 14px;
            color: #888;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* 输入卡片 */
        .input-section {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--steel);
            padding: 24px;
            margin-bottom: 20px;
            box-sizing: border-box;
            animation: fadeIn 0.5s ease; /* 翻页淡入动画 */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 8px;
            color: #666;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--steel);
            padding: 10px 0;
            margin-bottom: 24px;
            font-size: 16px;
            border-radius: 0;
            outline: none;
            color: var(--accent);
            text-align: left;
            display: block;
            appearance: none;
            -webkit-appearance: none;
            box-sizing: border-box;
        }

        /* 针对日期时间输入框的处理 */
        input[type="datetime-local"] {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            font-family: inherit;
        }

        textarea {
            height: 100px;
            resize: none;
            font-size: 18px;
        }

        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            font-size: 15px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }

        button:active {
            opacity: 0.7;
        }

        /* 12宫格设计 */
        #result-pan {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background-color: var(--steel);
            border: 1px solid var(--steel);
            margin-top: 20px;
            animation: fadeIn 0.6s ease;
        }

        .palace {
            background: rgba(255, 255, 255, 0.9);
            aspect-ratio: 1 / 1.2;
            padding: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .palace-name {
            font-size: 12px;
            font-weight: bold;
            color: #8b0000;
        }

        .stars {
            font-size: 11px;
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
        }

        .center-box {
            grid-column: 2 / 4;
            grid-row: 2 / 4;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .question-display {
            font-style: italic;
            color: #555;
            margin-top: 8px;
            border-top: 1px solid var(--steel);
            padding-top: 8px;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }
    </style>
</head>
<body>

<header>
    <h1>二狗军师</h1>
    <p>不确定就问问二狗。</p>
</header>

<div id="step1" class="input-section">
    <label>出生时间 (日期与具体到几点)</label>
    <input type="datetime-local" id="datetime" value="1995-01-01T12:00">

    <label>出生城市</label>
    <input type="text" id="city" placeholder="例如：杭州 或 浙江杭州">

    <label>性别 (排盘必需)</label>
    <select id="gender">
        <option value="male">乾 (男)</option>
        <option value="female">坤 (女)</option>
    </select>

    <button onclick="goToStep2()">军师准备好了</button>
</div>

<div id="step2" class="input-section" style="display:none;">
    <label>请详细描述你的问题</label>
    <textarea id="question" placeholder="例如：今年事业运势如何？适合创业吗？"></textarea>

    <button onclick="renderPan()">请军师指点</button>
</div>

<div id="result-pan" style="display:none;">
    </div>

<script>
// 从第一页进入第二页的逻辑
function goToStep2() {
    const datetimeVal = document.getElementById('datetime').value;
    if (!datetimeVal) {
        alert("请先选择出生时间！");
        return;
    }
    // 隐藏第一页，显示第二页
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
}

// 第二页点击排盘的逻辑
function renderPan() {
    const datetimeVal = document.getElementById('datetime').value;
    const city = document.getElementById('city').value;
    const gender = document.getElementById('gender').value;
    const question = document.getElementById('question').value;

    // 1. 解析合并后的日期和时间
    const parts = datetimeVal.split('T');
    const dateStr = parts[0]; // 提取 YYYY-MM-DD
    const hour = parseInt(parts[1].split(':')[0], 10); // 提取小时数 (0-23)
    
    // 2. 将 24 小时制转换为紫微斗数的 12 时辰索引 (0-11)
    // 算法：子时(23点-1点)为0，丑时(1点-3点)为1，依此类推
    const timeIdx = Math.floor((hour + 1) % 24 / 2);

    // 3. 隐藏输入框，准备显示排盘
    document.getElementById('step2').style.display = 'none';

    // 4. 调用算法排盘
    const astrolabe = iztro.astro.astrolabeBySolarDate(dateStr, timeIdx, gender);
    
    // 5. 显示容器并渲染
    const container = document.getElementById('result-pan');
    container.style.display = 'grid';
    container.innerHTML = ''; 

    astrolabe.palaces.forEach((palace, index) => {
        const div = document.createElement('div');
        div.className = 'palace';
        
        const majorStars = palace.majorStars.map(s => `<span>${s.name}</span>`).join('');
        
        div.innerHTML = `
            <div class="palace-name">${palace.name}</div>
            <div class="stars">${majorStars}</div>
            <div style="font-size:9px; color:#999; margin-top: auto;">${palace.decadal.range[0]}-${palace.decadal.range[1]}</div>
        `;
        container.appendChild(div);
        
        if(index === 3) {
            const center = document.createElement('div');
            center.className = 'center-box';
            
            // 将用户选择的具体时间(如 14:30)也显示在盘面上
            const timeStr = parts[1]; 
            
            center.innerHTML = `
                <div style="font-weight:bold; font-size:14px; margin-bottom: 4px;">${astrolabe.fiveElementsClass}局</div>
                <div style="font-size:11px; color:#666;">📍 ${city || '未提供城市'}</div>
                <div style="font-size:10px; color:#999; margin-bottom: 4px;">生于: ${timeStr}</div>
                <div class="question-display">问：${question || '未设问'}</div>
            `;
            container.appendChild(center);
        }
    });
}
</script>

</body>
</html>
